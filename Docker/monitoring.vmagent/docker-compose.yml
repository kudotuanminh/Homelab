services:
  vmagent:
    container_name: 'vmagent'
    image: 'victoriametrics/vmagent:v1.144.0'
    restart: unless-stopped
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--promscrape.config=/etc/prometheus/prometheus.yml'
      - '--remoteWrite.url=${VM_ENDPOINT:?error}/api/v1/write'
  node_exporter:
    container_name: 'node_exporter'
    image: 'prom/node-exporter:v1.11.1-distroless'
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    command:
      - '--path.rootfs=/rootfs'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
  cadvisor:
    container_name: 'cadvisor'
    image: 'gcr.io/cadvisor/cadvisor:v0.55.1'
    restart: unless-stopped
    volumes:
    - /:/rootfs:ro
    - /var/run:/var/run:rw
    - /sys:/sys:ro
    - /var/lib/docker/:/var/lib/docker:ro
    command:
      - '--housekeeping_interval=10s'
      - '--docker_only=true'
  endlessh:
    container_name: 'endlessh'
    image: 'shizunge/endlessh-go:latest'
    restart: unless-stopped
    ports:
      - '22:2222'
    command: '-interval_ms 10000 -geoip_supplier ip-api -enable_prometheus -logtostderr -v=1'

networks:
  default:
    name: monitoring
    external: true
#    driver: bridge
