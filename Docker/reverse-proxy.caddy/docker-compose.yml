name: caddy
services:
  caddy:
    build:
      context: .
      args:
        CADDY_VERSION: '2.11.2'
    container_name: 'caddy'
    restart: unless-stopped
    ports:
      - '443:443'
    environment:
      CLOUDFLARE_EMAIL: ${CLOUDFLARE_EMAIL:?error}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:?error}
      ACME_AGREE: true
    volumes:
      - ./data/caddy:/data
      - ./data/config:/config
      - ./config:/etc/caddy
      - /var/log/caddy:/log
    logging:
      driver: json-file
      options:
        max-size: "200m"

networks:
  default:
    name: proxy
#    external: true
    driver: bridge
