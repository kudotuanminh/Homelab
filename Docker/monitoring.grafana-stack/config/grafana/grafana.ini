[analytics]
reporting_enabled = false
check_for_updates = false
feedback_links_enabled = false

[users]
allow_sign_up = false
auto_assign_org = true
auto_assign_org_role = Viewer

[auth.anonymous]
enabled = false

[security]
cookie_secure = true
cookie_samesite = lax
strict_transport_security = true
content_security_policy = true

[log]
mode = console
level = info
